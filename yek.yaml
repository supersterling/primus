  - "bun.lock"
  - "tsconfig.tsbuildinfo"
  - "skills-lock.json"
  - ".docref.lock"
  - "patches/*"
  - "public/**"
  - "node_modules/**"
  - ".next/**"
  - ".vercel/**"
  - "src/components/ui/**"
  - "docs/references/**"
  - ".agents/skills/*/references/**"
  - ".agents/skills/*/scripts/**"
  - ".agents/skills/*/assets/**"
  - ".agents/skills/*/rules/**"
  - ".pi/skills/*/references/**"
  - ".pi/skills/*/scripts/**"
  - ".pi/skills/*/assets/**"
  - ".claude/skills/*/references/**"
  - ".factory/skills/*/references/**"
  - ".goose/skills/*/references/**"

priority_rules:
  - score: 99
    pattern: "^docs/"
  - score: 100
    pattern: "^.grit/"
